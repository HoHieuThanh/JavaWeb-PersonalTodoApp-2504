<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title}"></title>
</head>
<body>

<a href="?lang=vi">VI</a> | <a href="?lang=en">EN</a>

<h2 th:text="#{title}"></h2>

<h3>
    <span th:text="#{owner}"></span>:
    <span th:text="${ownerName}"></span>
</h3>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th th:text="#{content}"></th>
        <th th:text="#{dueDate}"></th>
        <th th:text="#{status}"></th>
        <th th:text="#{priority}"></th>
        <th th:text="#{action}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${todos}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.content}"></td>
        <td th:text="${t.dueDate}"></td>
        <td th:text="${t.status}"></td>
        <td th:text="${t.priority}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${t.id})}"
               th:text="#{edit}"></a>

            <a th:href="@{/delete/{id}(id=${t.id})}"
               th:attr="onclick=|return confirm('#{confirm.delete}')|"
               th:text="#{delete}">
            </a>
        </td>
    </tr>
    </tbody>
</table>

<hr>

<div th:if="${message}" style="color: green">
    <p th:text="${message}"></p>
</div>

<h2 th:text="#{add}"></h2>

<form th:action="@{/save}" method="post" th:object="${todo}">

    <input type="hidden" th:field="*{id}"/>

    <div>
        <label th:text="#{content}"></label>:
        <input type="text" th:field="*{content}">
        <div style="color:red" th:errors="*{content}"></div>
    </div>

    <div>
        <label th:text="#{dueDate}"></label>:
        <input type="date" th:field="*{dueDate}">
        <div style="color:red" th:errors="*{dueDate}"></div>
    </div>

    <div>
        <label th:text="#{status}"></label>:
        <input type="text" th:field="*{status}">
    </div>

    <div>
        <label th:text="#{priority}"></label>:
        <input type="text" th:field="*{priority}">
    </div>

    <button type="submit" th:text="#{save}"></button>

</form>

</body>
</html>

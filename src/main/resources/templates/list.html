<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nội dung</th>
        <th>Hạn</th>
        <th>Trạng thái</th>
        <th>Độ ưu tiên</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${todos}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.content}"></td>
        <td th:text="${t.dueDate}"></td>
        <td th:text="${t.status}"></td>
        <td th:text="${t.priority}"></td>
    </tr>
    </tbody>
</table>

<hr>

<h2>Thêm công việc</h2>

<form th:action="@{/add}" method="post" th:object="${todo}">

    <div>
        Nội dung:
        <input type="text" th:field="*{content}">
        <div style="color:red" th:errors="*{content}"></div>
    </div>

    <div>
        Ngày hết hạn:
        <input type="date" th:field="*{dueDate}">
        <div style="color:red" th:errors="*{dueDate}"></div>
    </div>

    <div>
        Trạng thái:
        <input type="text" th:field="*{status}">
    </div>

    <div>
        Độ ưu tiên:
        <input type="text" th:field="*{priority}">
    </div>

    <button type="submit">Thêm</button>

</form>

</body>
</html>
